# Traefik service: ClusterIP because we use hostPort (binds the pod's container
# ports directly to the kind node ports, which the kind extraPortMappings then
# expose to the host). NodePort can't legally use :80/:443 without expanding the
# default 30000-32767 range — hostPort is simpler and cleaner.
service:
  type: ClusterIP

ports:
  web:
    port: 80
    hostPort: 80
    redirectTo:
      port: websecure
  websecure:
    port: 443
    hostPort: 443
    tls:
      enabled: true

ingressRoute:
  dashboard:
    enabled: false

providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true

logs:
  general:
    level: WARN

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 128Mi

nodeSelector:
  ingress-ready: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
