{{- $ns := .Values.namespace }}
---
# 1. Default-deny all egress for every pod in the sre-copilot namespace.
# This is the baseline. All subsequent policies in this chart ADD exceptions.
# Note: allow-ollama-host-hop for backend pods lives in helm/platform/ollama-externalname
# (single-responsibility: that chart owns the Ollama ExternalName + its specific hop policy).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress: []
---
# 2. Allow DNS egress to CoreDNS in kube-system.
# Without this, every pod loses service discovery — DNS is a prerequisite for all other traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3. Allow same-namespace egress (any in-namespace pod-to-pod communication).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
---
# 4. Allow observability egress: backend pods → otel-collector in observability namespace.
# Wired in S3 when OTel collector is deployed; included now so policy is in place before collector arrives.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-egress
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
---
# 5. Allow ingress from the traefik namespace so the Traefik ingress controller can
# reach backend and frontend services. Without this, the ingress path is silently dropped.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-traefik
  namespace: {{ $ns }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
