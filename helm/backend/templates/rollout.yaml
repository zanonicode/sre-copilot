{{- if .Values.useArgoRollouts }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        rollout.sre-copilot/trigger: {{ .Values.rolloutTrigger | default "" | quote }}
    spec:
      serviceAccountName: backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
            {{- range $name, $cfg := .Values.providers }}
            {{- if $cfg.enabled }}
            - secretRef:
                name: backend-judge-{{ $name }}
                optional: true
            {{- end }}
            {{- end }}
          env:
            - name: ANOMALY_INJECTOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ANOMALY_INJECTOR_TOKEN
                  optional: true
            - name: JUDGE_CANARY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JUDGE_CANARY_TOKEN
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      affinity: {{ toYaml .Values.affinity | nindent 8 }}
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      canaryService: backend-canary
      stableService: backend-stable
      analysis:
        templates:
          - templateName: backend-canary-health
        startingStep: 1
        args:
          - name: service-name
            value: backend
      steps:
        - setWeight: 25
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: backend-canary-health
            args:
              - name: service-name
                value: backend
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: backend-canary-quality
        - setWeight: 100
{{- end }}
