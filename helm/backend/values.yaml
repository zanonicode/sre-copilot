# Set to true to deploy an Argo Rollouts Rollout instead of a plain Deployment.
# Requires argo-rollouts-controller in the cluster. Defaults to false for backwards compat.
# When enabled, also deploys a separate canary Service (backend-canary) and stable Service
# (backend-stable) for traffic splitting.
useArgoRollouts: true

replicaCount: 2

image:
  repository: sre-copilot/backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

apiHost: "api.sre-copilot.localtest.me"

resources:
  requests:
    cpu: 250m
    memory: 350Mi
  limits:
    cpu: 500m
    memory: 500Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

pdb:
  minAvailable: 1

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  ANOMALY_INJECTOR_TOKEN: ""
  JUDGE_CANARY_TOKEN: ""

rolloutTrigger: "2026-05-03-probe-leniency-and-smaller-sample"

# F1 quality gate: enabled now that stable pods carry JUDGE_CANARY_TOKEN
# AND ground-truth fixtures are bundled in the backend image
# (datasets/eval/ground_truth/*.json + tests/eval/judge/rubric.yaml).
canaryQualityGateEnabled: true

ollama:
  serviceUrl: "http://ollama.sre-copilot.svc.cluster.local:11434/v1"

llm:
  model: "qwen2.5:7b-instruct-q4_K_M"
  judgeModel: "llama3.1:8b-instruct-q4_K_M"

judge:
  sampleSize: 3
  passThreshold: 0.80
  timeoutSeconds: 240

judgeCanaryToken: ""

# Cloud judge providers — opt-in. Default empty = Ollama-only zero-config (preserves demo property).
# To enable a provider: set enabled=true, supply encryptedApiKey via --set-file from `kubeseal --raw`.
# The networkpolicy-judge-egress template gates egress on enabled+egressFqdn (defense-in-depth: no key, no egress).
providers:
  ollama:
    enabled: true
  anthropic:
    enabled: false
    encryptedApiKey: ""
    egressFqdn: "api.anthropic.com"
  openai:
    enabled: false
    encryptedApiKey: ""
    egressFqdn: "api.openai.com"
  gemini:
    enabled: false
    encryptedApiKey: ""
    egressFqdn: "generativelanguage.googleapis.com"

serviceMonitor:
  enabled: true
  interval: 30s

nodeSelector: {}
tolerations: []
affinity: {}
