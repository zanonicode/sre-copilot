mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.108.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          cors:
            allowed_origins:
              - "*"
            allowed_headers:
              - "*"

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 75
      spike_limit_percentage: 25
    batch:
      timeout: 5s
      send_batch_size: 1024
    resource:
      attributes:
        - key: deployment.environment
          value: kind-local
          action: upsert
    filter/healthz:
      error_mode: ignore
      traces:
        span:
          - 'attributes["http.target"] == "/healthz"'
          - 'attributes["http.target"] == "/metrics"'

  exporters:
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true
    loki:
      endpoint: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
      default_labels_enabled:
        exporter: false
        job: true
    prometheus:
      endpoint: 0.0.0.0:8889
      const_labels:
        cluster: kind-sre-copilot
      resource_to_telemetry_conversion:
        enabled: true
    debug:
      verbosity: basic

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions:
      - health_check
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - filter/healthz
          - resource
          - batch
        exporters:
          - otlp/tempo
      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - prometheus
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - loki

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 15s
  additionalLabels:
    release: prometheus
