tempo:
  reportingEnabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  retention: 24h

  server:
    http_listen_port: 3200
    grpc_listen_port: 9095

  distributor:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m

  compactor:
    compaction:
      block_retention: 24h

  querier:
    frontend_worker:
      frontend_address: localhost:9095

  # Enable metricsGenerator with local-blocks processor — required so
  # Grafana's Tempo plugin can run TraceQL search on filesystem storage.
  # Without this, queries fail with "backend TraceQL search queries are
  # not supported" even though /api/search via curl works fine.
  # NOTE: chart key is camelCase (metricsGenerator); rendered config is
  # snake_case (metrics_generator). They look like different things; they
  # aren't.
  metricsGenerator:
    enabled: true
    # The chart's metricsGenerator block historically focused on remote_write
    # for span-metrics. We don't need that — we just need the local-blocks
    # processor enabled per-tenant via the overrides default. Setting
    # remoteWriteUrl to "" keeps the chart from trying to push to a
    # non-existent Prometheus remote-write endpoint.
    remoteWriteUrl: ""

  # Apply local-blocks as the default tenant config. With
  # multitenancy_enabled: false, this single-tenant config is what every
  # ingested trace gets. The processor builds an in-process searchable
  # index over recent blocks so backend TraceQL queries succeed.
  overrides:
    defaults:
      metrics_generator:
        processors:
          - local-blocks

persistence:
  enabled: false

serviceMonitor:
  enabled: true
  additionalLabels:
    release: prometheus

tempoQuery:
  enabled: false
