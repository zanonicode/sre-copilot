tempo:
  reportingEnabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  retention: 24h

  server:
    http_listen_port: 3200
    grpc_listen_port: 9095

  distributor:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m

  compactor:
    compaction:
      block_retention: 24h

  querier:
    frontend_worker:
      frontend_address: localhost:9095

  # Enable metrics_generator with local-blocks processor — required so
  # Grafana's Tempo plugin can run TraceQL search on filesystem storage.
  # Without this, queries fail with "backend TraceQL search queries are
  # not supported" even though /api/search via curl works fine.
  metrics_generator:
    enabled: true
    processor:
      local_blocks:
        filter_server_spans: false
        flush_to_storage: true

# Apply the local-blocks processor as a default for all tenants (we run
# multitenancy_enabled: false, so this is the implicit single-tenant config).
overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks

persistence:
  enabled: false

serviceMonitor:
  enabled: true
  additionalLabels:
    release: prometheus

tempoQuery:
  enabled: false
