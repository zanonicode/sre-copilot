adminPassword: "sre-copilot-admin"

# Cap stale ReplicaSet accumulation — default is 10, which clutters
# the cluster on a long-lived dev kind setup.
revisionHistoryLimit: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

persistence:
  enabled: false

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: ALL

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.observability.svc.cluster.local:80
        isDefault: true
        jsonData:
          timeInterval: 30s
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        jsonData:
          derivedFields:
            # OTel logs SDK serializes the trace context as `traceid` (no
            # underscore) at the top level of the LogRecord JSON. The legacy
            # JsonFormatter in our backend used `trace_id`, so we match both.
            - datasourceName: Tempo
              matcherRegex: '"traceid":"([a-f0-9]{32})"'
              name: TraceID
              url: "${__value.raw}"
              datasourceUid: tempo
            - datasourceName: Tempo
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              name: TraceID (legacy)
              url: "${__value.raw}"
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          # Disable gRPC streaming — Grafana's Tempo plugin would try to
          # stream over the HTTP port (3200) and fail with 'http2: frame
          # too large'. Tempo's actual gRPC port is 9095, but for trace-id
          # lookups streaming buys nothing and HTTP /api/v2/traces works
          # fine. This is the difference between "trace ID link opens No
          # data" vs "opens the full span tree".
          streamingEnabled:
            search: false
            metrics: false
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true

grafana.ini:
  server:
    # Subdomain pattern: grafana.sre-copilot.localtest.me serves at root path.
    # Override domain via grafana.fullnameOverride or env if your INGRESS_HOST varies.
    root_url: "https://grafana.sre-copilot.localtest.me/"
    serve_from_sub_path: false
  auth.anonymous:
    enabled: true
    org_role: Viewer
  security:
    allow_embedding: true
