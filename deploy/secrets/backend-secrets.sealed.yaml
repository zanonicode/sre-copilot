# SAMPLE SEALED SECRET — committed to repo as documentation pattern.
#
# This file was generated with:
#   make seal SECRET_NAME=backend-secrets KEY=ANOMALY_INJECTOR_TOKEN VALUE=<redacted>
#
# The encrypted value below is a PLACEHOLDER (sealed against a sample controller keypair).
# To generate a real sealed secret for your cluster, run:
