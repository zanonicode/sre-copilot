apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: "25.x.x"
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/helm/observability/lgtm/prometheus-values.yaml
    - repoURL: https://github.com/zanonicode/sre-copilot
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  ignoreDifferences:
    # Workaround for ArgoCD v2.12-2.14 K8s 1.35 schema bug: the new
    # status.terminatingReplicas field on Deployments isn't in ArgoCD's
    # embedded schema, breaking structured-merge-diff. Ignoring it lets
    # the app actually sync.
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
