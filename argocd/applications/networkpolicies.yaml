apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networkpolicies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/zanonicode/sre-copilot
    targetRevision: main
    path: helm/platform/networkpolicies
    helm:
      valueFiles:
        - values.yaml
      releaseName: networkpolicies
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-copilot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
