apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: "2.17.x"
      helm:
        releaseName: sealed-secrets
        valueFiles:
          - $values/helm/platform/sealed-secrets/values.yaml
    - repoURL: https://github.com/zanonicode/sre-copilot
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  ignoreDifferences:
    # Workaround for ArgoCD v2.12-2.14 K8s 1.35 schema bug: status.terminatingReplicas
    # is not in ArgoCD's embedded schema, breaking structured-merge-diff.
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
