apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/zanonicode/sre-copilot
    targetRevision: main
    path: helm/backend
    helm:
      valueFiles:
        - values.yaml
      releaseName: backend
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-copilot
  ignoreDifferences:
    # Workaround for ArgoCD v2.12-2.14 K8s 1.35 schema bug: status.terminatingReplicas
    # is not in ArgoCD's embedded schema, breaking structured-merge-diff.
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
