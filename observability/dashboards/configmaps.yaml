apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-health
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "SRE Copilot"
data:
  cluster-health.json: |-
    {
      "title": "Cluster Health",
      "uid": "cluster-health",
      "schemaVersion": 36,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Pods Running",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\", namespace=~\"sre-copilot|platform|observability\"})",
              "legendFormat": "pods running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Node Count",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "nodes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Container Memory Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"sre-copilot\", container!=\"\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Container CPU Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"sre-copilot\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Observability Stack Memory",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"observability\", container!=\"\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Pod Restarts",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=~\"sre-copilot|platform|observability\"}[1h])",
              "legendFormat": "{{pod}} / {{container}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cost-capacity
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "SRE Copilot"
data:
  cost-capacity.json: |-
    {
      "title": "Cost and Capacity",
      "uid": "cost-capacity",
      "schemaVersion": 36,
      "refresh": "60s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Cluster Memory Requested",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\", namespace=~\"sre-copilot|platform|observability\"})",
              "legendFormat": "memory requested",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Cluster CPU Requested",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"sre-copilot|platform|observability\"})",
              "legendFormat": "CPU cores requested",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Total Input Tokens (session)",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "sum"
              ]
            }
          },
          "targets": [
            {
              "expr": "increase(llm_tokens_input_total[6h])",
              "legendFormat": "input tokens",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Total Output Tokens (session)",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "sum"
              ]
            }
          },
          "targets": [
            {
              "expr": "increase(llm_tokens_output_total[6h])",
              "legendFormat": "output tokens",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Memory Utilization by Namespace",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"sre-copilot|platform|observability\", container!=\"\"})",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "CPU Utilization by Namespace",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"sre-copilot|platform|observability\", container!=\"\"}[5m]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Token Cost Proxy (tokens per LLM call)",
          "description": "Average tokens per LLM endpoint call (10m window, only counts /analyze/logs and /generate/postmortem so /healthz noise doesn't dilute the ratio).",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 12
          },
          "datasource": {
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 1,
              "noValue": "0",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": true
              }
            }
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "(sum(rate(llm_tokens_output_total[10m])) or vector(0)) / clamp_min(sum(rate(http_server_duration_milliseconds_count{service_name=\"sre-copilot-backend\",http_target=~\"/analyze/.*|/generate/.*\"}[10m])), 1)",
              "legendFormat": "output tokens/call",
              "refId": "A"
            },
            {
              "expr": "(sum(rate(llm_tokens_input_total[10m])) or vector(0)) / clamp_min(sum(rate(http_server_duration_milliseconds_count{service_name=\"sre-copilot-backend\",http_target=~\"/analyze/.*|/generate/.*\"}[10m])), 1)",
              "legendFormat": "input tokens/call",
              "refId": "B"
            }
          ]
        }
      ]
    }
